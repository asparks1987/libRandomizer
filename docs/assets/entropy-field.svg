<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Entropy field visualization</title>
  <desc id="desc">A field of code fragments, dots, and colored signals representing random values across SDK languages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0b1524"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="640" rx="42" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8b949e">
    <path d="M80 120H880M80 220H880M80 320H880M80 420H880M80 520H880"/>
    <path d="M160 70V570M320 70V570M480 70V570M640 70V570M800 70V570"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="110" y="104" width="360" height="168" rx="18" fill="#21262d"/>
    <rect x="512" y="126" width="318" height="130" rx="18" fill="#238636"/>
    <rect x="178" y="352" width="286" height="148" rx="18" fill="#1f6feb"/>
    <rect x="512" y="338" width="260" height="176" rx="18" fill="#30363d"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">
    <text x="142" y="158" fill="#f0f6fc">randomInt()</text>
    <text x="142" y="206" fill="#7ee787">42</text>
    <text x="544" y="180" fill="#f0f6fc">randomFloat()</text>
    <text x="544" y="222" fill="#7ee787">0.7319</text>
    <text x="210" y="410" fill="#f0f6fc">randomChar()</text>
    <text x="210" y="454" fill="#a5d6ff">"Q"</text>
    <text x="544" y="394" fill="#f0f6fc">15 SDKs</text>
    <text x="544" y="438" fill="#7ee787">1 contract</text>
  </g>
  <g>
    <circle cx="118" cy="548" r="10" fill="#7ee787"/>
    <circle cx="168" cy="566" r="5" fill="#f2cc60"/>
    <circle cx="238" cy="560" r="8" fill="#a5d6ff"/>
    <circle cx="820" cy="92" r="8" fill="#ff7b72"/>
    <circle cx="858" cy="124" r="5" fill="#f2cc60"/>
    <circle cx="780" cy="108" r="10" fill="#7ee787"/>
    <circle cx="462" cy="576" r="7" fill="#7ee787"/>
    <circle cx="496" cy="552" r="4" fill="#ff7b72"/>
    <circle cx="530" cy="580" r="9" fill="#a5d6ff"/>
  </g>
</svg>
