<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Input and output schema to seeded training pair flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F8FF"/>
      <stop offset="1" stop-color="#E7F6EE"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="120" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D6CDF"/>
      <stop offset="1" stop-color="#2A9D6F"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="800" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#19324A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="70" y="92" width="276" height="176" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="70" y="322" width="276" height="176" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="70" y="552" width="276" height="138" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="462" y="70" width="276" height="214" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="462" y="300" width="276" height="214" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="854" y="184" width="276" height="214" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
    <rect x="854" y="414" width="276" height="214" rx="22" fill="url(#panel)" stroke="#D6E2EA"/>
  </g>

  <path d="M346 180H430" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M346 410H430" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M738 178H822" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M738 408H822" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M346 616H610" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <circle cx="430" cy="180" r="14" fill="#2D6CDF"/>
  <circle cx="430" cy="410" r="14" fill="#2A9D6F"/>
  <circle cx="822" cy="178" r="14" fill="#2D6CDF"/>
  <circle cx="822" cy="408" r="14" fill="#2A9D6F"/>
  <circle cx="610" cy="616" r="14" fill="#D97745"/>

  <g fill="#18314C" font-family="Inter, Arial, sans-serif">
    <text x="104" y="140" font-size="28" font-weight="700">Input schema</text>
    <text x="104" y="178" font-size="20">integer</text>
    <text x="104" y="210" font-size="20">string</text>
    <text x="104" y="242" font-size="20">object / array</text>

    <text x="104" y="370" font-size="28" font-weight="700">Seeded input</text>
    <text x="104" y="408" font-size="20">same seed = same records</text>
    <text x="104" y="440" font-size="20">deterministic generation</text>
    <text x="104" y="472" font-size="20">JSON-native values</text>

    <text x="104" y="596" font-size="28" font-weight="700">Training pair</text>
    <text x="104" y="636" font-size="20">input</text>
    <text x="104" y="668" font-size="20">output</text>

    <text x="494" y="118" font-size="28" font-weight="700">Output schema</text>
    <text x="494" y="156" font-size="20">class, score, sequence</text>
    <text x="494" y="188" font-size="20">or nested object</text>
    <text x="494" y="220" font-size="20">optional transform</text>

    <text x="494" y="348" font-size="28" font-weight="700">Serialization</text>
    <text x="494" y="386" font-size="20">JSON</text>
    <text x="494" y="418" font-size="20">JSONL</text>
    <text x="494" y="450" font-size="20">CSV</text>
    <text x="494" y="482" font-size="20">flat, deterministic columns</text>

    <text x="886" y="232" font-size="28" font-weight="700">Cross-language</text>
    <text x="886" y="270" font-size="20">Python reference</text>
    <text x="886" y="302" font-size="20">portable schema spec</text>
    <text x="886" y="334" font-size="20">native bindings later</text>

    <text x="886" y="462" font-size="28" font-weight="700">Developer output</text>
    <text x="886" y="500" font-size="20">classification</text>
    <text x="886" y="532" font-size="20">regression</text>
    <text x="886" y="564" font-size="20">tabular and sequence</text>
    <text x="886" y="596" font-size="20">repeatable datasets</text>
  </g>
</svg>
